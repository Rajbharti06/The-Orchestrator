<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StackForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  </head>
  <body class="bg-gray-900 text-gray-100">
    <div id="root" class="min-h-screen p-6"></div>
    <script>
      const { useState, useEffect } = React;
      function App() {
        const [prompt, setPrompt] = useState('build login system');
        const [llm, setLlm] = useState('auto');
        const [hosting, setHosting] = useState('auto');
        const [logs, setLogs] = useState([]);
        const [links, setLinks] = useState({ repo: null, url: null });
        useEffect(() => {
          const es = new EventSource('http://localhost:5001/logs');
          es.onmessage = (e) => {
            setLogs((prev) => [...prev, e.data]);
            if (e.data.startsWith('GitHub:')) setLinks((l) => ({ ...l, repo: e.data.replace('GitHub: ', '') }));
            if (e.data.startsWith('Deploy:')) setLinks((l) => ({ ...l, url: e.data.replace('Deploy: ', '') }));
          };
          return () => es.close();
        }, []);
        const startBuild = async () => {
          await fetch('http://localhost:5001/build', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt, llm, hosting })
          });
        };
        return (
          React.createElement('div', { className: 'max-w-4xl mx-auto space-y-6' },
            React.createElement('div', { className: 'bg-gray-800 rounded-lg p-6 shadow' },
              React.createElement('h1', { className: 'text-2xl font-semibold mb-4' }, 'StackForge ⚡'),
              React.createElement('div', { className: 'space-y-3' },
                React.createElement('input', {
                  className: 'w-full p-3 rounded bg-gray-700',
                  value: prompt, onChange: (e) => setPrompt(e.target.value), placeholder: 'Prompt'
                }),
                React.createElement('div', { className: 'grid grid-cols-2 gap-4' },
                  React.createElement('select', {
                    className: 'p-3 rounded bg-gray-700', value: llm,
                    onChange: (e) => setLlm(e.target.value)
                  }, [
                    React.createElement('option', { key: 'auto', value: 'auto' }, 'Auto'),
                    React.createElement('option', { key: 'groq', value: 'groq' }, 'Groq'),
                    React.createElement('option', { key: 'openrouter', value: 'openrouter' }, 'OpenRouter'),
                    React.createElement('option', { key: 'local', value: 'local' }, 'Local')
                  ]),
                  React.createElement('select', {
                    className: 'p-3 rounded bg-gray-700', value: hosting,
                    onChange: (e) => setHosting(e.target.value)
                  }, [
                    React.createElement('option', { key: 'auto', value: 'auto' }, 'Auto'),
                    React.createElement('option', { key: 'vercel', value: 'vercel' }, 'Vercel'),
                    React.createElement('option', { key: 'railway', value: 'railway' }, 'Railway'),
                    React.createElement('option', { key: 'render', value: 'render' }, 'Render')
                  ])
                ),
                React.createElement('button', {
                  className: 'px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded',
                  onClick: startBuild
                }, '🚀 Build App')
              )
            ),
            React.createElement('div', { className: 'bg-gray-800 rounded-lg p-6 shadow' },
              React.createElement('h2', { className: 'text-xl font-semibold mb-3' }, 'Live Execution'),
              React.createElement('div', { className: 'h-64 overflow-auto bg-gray-900 rounded p-3 text-sm' },
                logs.map((l, i) => React.createElement('div', { key: i }, l))
              )
            ),
            React.createElement('div', { className: 'bg-gray-800 rounded-lg p-6 shadow' },
              React.createElement('h2', { className: 'text-xl font-semibold mb-3' }, 'Output'),
              React.createElement('div', { className: 'space-y-2' },
                React.createElement('div', null, '✅ GitHub Repo: ', links.repo ? React.createElement('a', { className: 'text-indigo-400', href: links.repo, target: '_blank' }, links.repo) : '—'),
                React.createElement('div', null, '🚀 Live App: ', links.url ? React.createElement('a', { className: 'text-indigo-400', href: links.url, target: '_blank' }, links.url) : '—')
              )
            )
          )
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
  </body>
</html>
